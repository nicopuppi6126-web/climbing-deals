name: Daily Climbing Deals

on:
  schedule:
    # Runs every day at 7:00 AM UTC (8am UK summer / 7am winter)
    - cron: "0 7 * * *"
  workflow_dispatch:   # also lets you run it manually with one click

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py

      - name: Commit updated deals log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deals_log.csv
          git diff --staged --quiet || git commit -m "chore: deals log $(date -u +%Y-%m-%d)"
          git push
